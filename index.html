<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduardOS | Debate Case Manager</title>
    <style>
        :root { 
            --accent: #002347; 
            --bg: #f4f7f9; 
            --border: #ced4da; 
            --text: #1c1e21; 
            --font-main: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --toolbar-bg: white;
            --block-bg: white;
        }

        body.dark-mode {
            --bg: #121212;
            --text: #e0e0e0;
            --border: #333;
            --toolbar-bg: #1a1a1a;
            --block-bg: #2a2a2a;
            background-color: #121212;
        }

        body.dark-mode #workspace, 
        body.dark-mode #tab-view, 
        body.dark-mode #sidebar, 
        body.dark-mode .doc { background: #1a1a1a; color: #e0e0e0; }
        
        body.dark-mode .btn { background: #2a2a2a; color: #e0e0e0; border-color: #444; }
        body.dark-mode #main-section { background: #161616; }
        body.dark-mode .tab-item { background: var(--block-bg); color: #e0e0e0; border-color: #444; }
        body.dark-mode #active-title, body.dark-mode #active-body { color: #e0e0e0; }
        body.dark-mode .action-popup, body.dark-mode .tab-menu { background: #252525; border-color: #444; color: #e0e0e0; }

        body { margin: 0; font-family: var(--font-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--text); transition: background 0.3s; }
        
        #toolbar { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; background: var(--toolbar-bg); gap: 10px; z-index: 100; flex-shrink: 0; }
        .logo-box { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--accent); border-right: 1px solid var(--border); padding-right: 15px; cursor: pointer; }
        .logo-circle { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-family: serif; }

        .btn { padding: 8px 14px; border: 1px solid var(--border); background: white; cursor: pointer; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: var(--font-main); transition: 0.2s; color: var(--accent); }
        .btn:hover { background: #f0f4f8; }

        #stopwatch-container { display: flex; align-items: center; gap: 12px; position: absolute; left: 50%; transform: translateX(-50%); background: #f1f3f5; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }
        body.dark-mode #stopwatch-container { background: #252525; }
        #timer-display { font-family: monospace; font-size: 16px; font-weight: 700; color: var(--accent); min-width: 90px; text-align: center; }
        body.dark-mode #timer-display { color: #fff; }
        .stopwatch-btn { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 14px; font-weight: 800; padding: 2px 6px; }
        body.dark-mode .stopwatch-btn { color: #fff; }

        #home-screen { 
            position: fixed; top: 50px; left: 0; width: 100%; height: calc(100% - 50px); 
            background: linear-gradient(rgba(0, 35, 71, 0.5), rgba(0, 35, 71, 0.7)), url('https://image2url.com/r2/default/images/1772485982259-44630081-12dd-4d2c-8975-d889f689d625.png');
            background-size: cover; background-position: center;
            z-index: 90; display: flex; flex-direction: column; padding: 40px; box-sizing: border-box; overflow-y: auto; 
        }

        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto; }
        
        .case-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px) saturate(160%); 
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 18px; padding: 25px; cursor: pointer; position: relative; transition: 0.3s ease; color: white;
            min-height: 100px; display: flex; align-items: center;
        }
        .case-card:hover { 
            background: rgba(255, 255, 255, 0.2); 
            transform: translateY(-4px); 
            border: 1px solid rgba(255, 255, 255, 0.35);
        }
        
        .trash-icon { opacity: 0.3; transition: opacity 0.2s; cursor: pointer; }
        .trash-icon:hover { opacity: 1.0; }

        #workspace { display: none; flex: 1; overflow: hidden; background: #fff; }
        #main-section { width: 40%; min-width: 250px; padding: 20px; background: #eaeff2; overflow-y: auto; box-sizing: border-box; }
        
        #resizer { width: 10px; cursor: col-resize; z-index: 1000; background: #dee2e6; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        #resizer:hover { background: var(--accent); opacity: 0.3; }

        #right-zone { flex: 1; display: flex; overflow: hidden; }
        #tab-view { flex: 1; padding: 45px; overflow-y: auto; background: white; }
        #sidebar { width: 320px; border-left: 1px solid var(--border); background: #fdfdfd; display: flex; flex-direction: column; }
        
        .doc { background: white; min-height: 100%; padding: 45px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); outline: none; }
        
        .search-container { padding: 15px; border-bottom: 1px solid #eee; }
        #sidebar-search { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; box-sizing: border-box; background: transparent; color: inherit; }
        
        #tab-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .tab-item { position: relative; padding: 14px; margin: 5px 15px; background: white; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        .tab-item.active { border-color: var(--accent); border-width: 2px; font-weight: 700; }

        .action-popup, .tab-menu { position: absolute; background: white; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 3000; display: none; flex-direction: column; overflow: hidden; border: 1px solid #eee; width: 160px; color: var(--text); }
        .action-popup { top: 45px; right: 10px; }
        .tab-menu { top: 40px; right: 10px; }

        button.menu-btn { border: none; background: none; padding: 10px 15px; text-align: left; cursor: pointer; font-size: 13px; width: 100%; color: inherit; }
        button.menu-btn:hover { background: rgba(0,0,0,0.05); }

        #sticky-note { position: absolute; width: 300px; height: 300px; background: #fff9c4; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-radius: 4px; display: none; flex-direction: column; z-index: 2500; top: 100px; left: 100px; border: 1px solid #f0e68c; overflow: hidden; resize: both; }
        #sticky-header { padding: 12px; background: #f0e68c; cursor: move; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: #857b26; user-select: none; }
        #sticky-content { flex: 1; border: none; background: transparent; padding: 15px; resize: none; outline: none; font-family: monospace; font-size: 14px; color: #1c1e21; }

        #speech-win { position: fixed; width: 450px; background: white; border-radius: 12px; box-shadow: 0 25px 60px rgba(0,0,0,0.4); display: none; z-index: 5000; top: 50%; left: 50%; transform: translate(-50%, -50%); overflow: hidden; border: 1px solid var(--border); color: #1c1e21; }
        body.dark-mode #speech-win { background: #252525; color: #fff; }
        #speech-head { padding: 15px; background: var(--accent); color:white; display:flex; justify-content:space-between; font-weight:700; }
        .speech-table { width:100%; font-size:14px; border-collapse: collapse; }
        .speech-table th { background: #f8f9fa; text-align: left; padding: 12px 15px; border-bottom: 2px solid #dee2e6; color: var(--accent); }
        body.dark-mode .speech-table th { background: #1a1a1a; color: #fff; border-bottom: 2px solid #444; }
        .speech-table td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        body.dark-mode .speech-table td { border-bottom: 1px solid #333; }
        .time-col { font-family: monospace; font-weight: bold; color: #d63384; text-align: right; }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="logo-box" onclick="location.reload()"><div class="logo-circle">E</div><span>EduardOS</span></div>
    <button class="btn" onclick="showHome()">Home</button>
    <button class="btn" onclick="toggleSpeech()">Speaker Order</button>
    <div id="stopwatch-container">
        <button class="stopwatch-btn" onclick="toggleTimer()" id="st-btn">START</button>
        <div id="timer-display">00:00:00</div>
        <button class="stopwatch-btn" onclick="resetTimer()">RESET</button>
    </div>
    <div style="flex:1"></div>
    <button class="btn" id="notes-btn" onclick="toggleNotes()" style="display:none; background: #fff9c4; color: #857b26; border: none;">Quick Note</button>
    <button class="btn" id="add-tab-btn" onclick="addTab()" style="display:none;">+ New Block</button>
    <button class="btn" onclick="toggleSettings(event)">Settings</button>
    
    <div id="settings-popup" class="action-popup">
        <button class="menu-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
        <button class="menu-btn" style="color:red;" onclick="clearAllCases()">Clear All Data</button>
    </div>
</div>

<div id="speech-win">
    <div id="speech-head"><span>LD Speaker Order</span><span onclick="toggleSpeech()" style="cursor:pointer">CLOSE</span></div>
    <table class="speech-table">
        <thead><tr><th>Speech</th><th style="text-align: right;">Time</th></tr></thead>
        <tbody>
            <tr><td>1AC</td><td class="time-col">6:00</td></tr>
            <tr><td>Neg CX Aff</td><td class="time-col">3:00</td></tr>
            <tr><td>1NC</td><td class="time-col">7:00</td></tr>
            <tr><td>Aff CX Neg</td><td class="time-col">3:00</td></tr>
            <tr><td>1AR</td><td class="time-col">4:00</td></tr>
            <tr><td>NR</td><td class="time-col">6:00</td></tr>
            <tr><td>2AR</td><td class="time-col">3:00</td></tr>
            <tr style="background: rgba(255, 249, 219, 0.1);"><td>Prep Time</td><td class="time-col">4:00</td></tr>
        </tbody>
    </table>
</div>

<div id="home-screen">
    <div style="display:flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%; color: white;">
        <h1 style="font-size: 32px; letter-spacing: -1px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">Strategic Case Files</h1>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="document.getElementById('import-input').click()">Import Case</button>
            <button class="btn" style="background: var(--accent); color:white; border:none;" onclick="createNewCase()">+ Create New Case</button>
            <input type="file" id="import-input" style="display:none;" accept=".json" onchange="importCase(event)">
        </div>
    </div>
    <div class="case-grid" id="case-grid"></div>
</div>

<div id="workspace">
    <div id="main-section"><div id="main-editor" class="doc" contenteditable="true" oninput="syncMainCase()"></div></div>
    <div id="resizer"></div>
    <div id="right-zone">
        <div id="tab-view">
            <div id="active-title" style="font-size:34px; margin-bottom:20px; font-weight:700; outline:none;" contenteditable="true" oninput="syncTabTitle()"></div>
            <div id="active-body" style="outline:none; line-height:1.8; font-size:18px;" contenteditable="true" oninput="syncTabBody()"></div>
        </div>
        <div id="sidebar">
            <div class="search-container"><input type="text" id="sidebar-search" placeholder="Search arguments..." oninput="renderTabs()"></div>
            <div id="tab-list"></div>
        </div>
    </div>
</div>

<div id="sticky-note">
    <div id="sticky-header"><span>FLOATING FLOW NOTE</span><span onclick="toggleNotes()" style="cursor:pointer">CLOSE</span></div>
    <textarea id="sticky-content" placeholder="Type and drag to sidebar..." oninput="saveNotes()"></textarea>
</div>

<script>
    let cases = JSON.parse(localStorage.getItem('eduardos_data_v4')) || [];
    let currentCaseIdx = null, currentTabIdx = null;

    const resizer = document.getElementById('resizer');
    const leftSide = document.getElementById('main-section');
    resizer.addEventListener('mousedown', (e) => {
        const doResize = (ev) => {
            const width = (ev.clientX / window.innerWidth) * 100;
            if (width > 15 && width < 80) leftSide.style.width = width + '%';
        };
        const stopResize = () => { document.removeEventListener('mousemove', doResize); };
        document.addEventListener('mousemove', doResize);
        document.addEventListener('mouseup', stopResize, {once:true});
    });

    function renderHome() {
        document.getElementById('home-screen').style.display = "flex";
        document.getElementById('workspace').style.display = "none";
        document.getElementById('notes-btn').style.display = "none";
        document.getElementById('add-tab-btn').style.display = "none";
        const grid = document.getElementById('case-grid'); grid.innerHTML = '';
        cases.forEach((c, i) => {
            const card = document.createElement('div'); card.className = 'case-card';
            card.onclick = () => openCase(i);
            card.innerHTML = `<strong style="font-size: 18px;">${c.name}</strong>
                <div style="position:absolute; top:20px; right:15px; display:flex; gap:12px; align-items:center;">
                    <div style="cursor:pointer; font-weight:bold; font-size:20px;" onclick="toggleCaseMenu(event, ${i})">⋮</div>
                    <div class="trash-icon" onclick="deleteCase(event, ${i})">🗑️</div>
                </div>
                <div id="case-menu-${i}" class="action-popup" style="display:none; top:40px; right:0;">
                    <button class="menu-btn" onclick="renameCase(event, ${i})">Rename</button>
                    <button class="menu-btn" onclick="exportCase(event, ${i})">Export Case</button>
                </div>`;
            grid.appendChild(card);
        });
    }

    function toggleCaseMenu(e, i) { e.stopPropagation(); closeMenus(); document.getElementById(`case-menu-${i}`).style.display = 'flex'; }
    function toggleSettings(e) { if(e) e.stopPropagation(); const p = document.getElementById('settings-popup'); const v = p.style.display === 'flex'; closeMenus(); p.style.display = v ? 'none' : 'flex'; }
    function closeMenus() { document.querySelectorAll('.action-popup, .tab-menu').forEach(m => m.style.display = 'none'); }
    window.onclick = (e) => { if (!e.target.closest('.action-popup') && !e.target.closest('.btn')) closeMenus(); };

    function openCase(i) {
        currentCaseIdx = i;
        document.getElementById('home-screen').style.display = "none";
        document.getElementById('workspace').style.display = "flex";
        document.getElementById('notes-btn').style.display = "block";
        document.getElementById('add-tab-btn').style.display = "block";
        document.getElementById('main-editor').innerHTML = cases[i].mainContent || "";
        renderTabs();
    }

    function renderTabs() {
        const list = document.getElementById('tab-list'); list.innerHTML = '';
        const search = document.getElementById('sidebar-search').value.toLowerCase();
        cases[currentCaseIdx].tabs.forEach((t, i) => {
            if (search && !t.title.toLowerCase().includes(search)) return;
            const d = document.createElement('div');
            d.className = `tab-item ${i === currentTabIdx ? 'active' : ''}`;
            if (!document.body.classList.contains('dark-mode')) { d.style.background = t.color || 'white'; }
            d.onclick = () => selectTab(i);
            d.innerHTML = `<span>${t.title}</span><span onclick="toggleTabMenu(event, ${i})">⋮</span>
                <div id="tab-menu-${i}" class="tab-menu">
                    <button class="menu-btn" onclick="tabify(event, ${i})">Tabify (Sticky)</button>
                    <button class="menu-btn" style="color:red" onclick="deleteTab(event, ${i})">Delete</button>
                </div>`;
            list.appendChild(d);
        });
    }

    function tabify(e, i) { e.stopPropagation(); const t = cases[currentCaseIdx].tabs[i]; document.getElementById('sticky-content').value = t.body; cases[currentCaseIdx].tabs.splice(i, 1); noteEl.style.display = 'flex'; save(); renderTabs(); }
    function selectTab(i) { currentTabIdx = i; document.getElementById('active-title').innerText = cases[currentCaseIdx].tabs[i].title; document.getElementById('active-body').innerHTML = cases[currentCaseIdx].tabs[i].body; renderTabs(); }
    function addTab() { cases[currentCaseIdx].tabs.push({ title: "New Block", body: "...", color: "white" }); save(); renderTabs(); }
    function createNewCase() { const n = prompt("Case Name:"); if(n) { cases.push({ name: n, mainContent: "", tabs: [] }); save(); renderHome(); } }
    function renameCase(e, i) { e.stopPropagation(); const n = prompt("Rename:", cases[i].name); if(n) { cases[i].name = n; save(); renderHome(); } }
    function deleteCase(e, i) { e.stopPropagation(); if(confirm("Delete this case?")) { cases.splice(i,1); save(); renderHome(); } }
    
    function exportCase(e, i) {
        e.stopPropagation();
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cases[i]));
        const link = document.createElement('a');
        link.setAttribute("href", dataStr); link.setAttribute("download", cases[i].name + ".json");
        document.body.appendChild(link); link.click(); link.remove();
    }

    function importCase(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try { const imported = JSON.parse(e.target.result); cases.push(imported); save(); renderHome(); } 
            catch (err) { alert("Invalid case file."); }
        };
        reader.readAsText(file);
    }

    function clearAllCases() {
        if (confirm("Are you sure you want to delete ALL cases?")) {
            if (confirm("FINAL WARNING: This cannot be undone.")) { cases = []; save(); renderHome(); }
        }
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); if(currentCaseIdx !== null) renderTabs(); }
    function save() { localStorage.setItem('eduardos_data_v4', JSON.stringify(cases)); }
    function showHome() { renderHome(); }
    function syncMainCase() { cases[currentCaseIdx].mainContent = document.getElementById('main-editor').innerHTML; save(); }
    function syncTabTitle() { cases[currentCaseIdx].tabs[currentTabIdx].title = document.getElementById('active-title').innerText; save(); renderTabs(); }
    function syncTabBody() { cases[currentCaseIdx].tabs[currentTabIdx].body = document.getElementById('active-body').innerHTML; save(); }
    function toggleSpeech() { const s = document.getElementById('speech-win'); s.style.display = s.style.display === 'block' ? 'none' : 'block'; }
    function toggleTabMenu(e, i) { e.stopPropagation(); closeMenus(); document.getElementById(`tab-menu-${i}`).style.display = 'flex'; }

    let startTime, elapsedTime = 0, timerInterval, timerRunning = false;
    function toggleTimer() {
        if (!timerRunning) {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                let d = elapsedTime, m = Math.floor(d/60000), s = Math.floor((d%60000)/1000), ms = Math.floor((d%1000)/10);
                document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}:${ms.toString().padStart(2,'0')}`;
            }, 10);
            document.getElementById('st-btn').innerText = 'PAUSE'; timerRunning = true;
        } else { clearInterval(timerInterval); document.getElementById('st-btn').innerText = 'START'; timerRunning = false; }
    }
    function resetTimer() { clearInterval(timerInterval); elapsedTime = 0; timerRunning = false; document.getElementById('timer-display').innerText = '00:00:00'; document.getElementById('st-btn').innerText = 'START'; }

    const noteEl = document.getElementById("sticky-note");
    const sidebarEl = document.getElementById("sidebar");
    let activeDrag = false, xOffset = 0, yOffset = 0, initialX, initialY;
    function toggleNotes() { noteEl.style.display = noteEl.style.display === 'flex' ? 'none' : 'flex'; }
    document.addEventListener("mousedown", (e) => { if (e.target.closest('#sticky-header')) { activeDrag = true; initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; }});
    document.addEventListener("mousemove", (e) => { if (activeDrag) { xOffset = e.clientX - initialX; yOffset = e.clientY - initialY; noteEl.style.transform = `translate3d(${xOffset}px, ${yOffset}px, 0)`; }});
    document.addEventListener("mouseup", (e) => {
        if (!activeDrag) return;
        const rect = sidebarEl.getBoundingClientRect();
        if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
            cases[currentCaseIdx].tabs.push({ title: "New Flow Point", body: document.getElementById('sticky-content').value, color: "#fff9c4" });
            document.getElementById('sticky-content').value = ''; noteEl.style.display = 'none';
            save(); renderTabs();
        }
        activeDrag = false;
    });

    renderHome();
</script>
</body>
</html>
