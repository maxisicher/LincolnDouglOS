<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduardOS | Debate Case Manager</title>
    <style>
        :root { 
            --accent: #002347; 
            --bg: #f4f7f9; 
            --border: #ced4da; 
            --text: #1c1e21; 
            --font-main: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --toolbar-bg: white;
            --block-bg: white;
            --logo-text: #002347;
        }

        body.dark-mode {
            --bg: #121212;
            --text: #e0e0e0;
            --border: #333;
            --toolbar-bg: #1a1a1a;
            --block-bg: #2a2a2a;
            --logo-text: #ffffff;
            background-color: #121212;
        }

        body.dark-mode #workspace, 
        body.dark-mode #tab-view, 
        body.dark-mode #sidebar, 
        body.dark-mode .doc,
        body.dark-mode #active-title,
        body.dark-mode #active-body { background: #1a1a1a; color: #e0e0e0; }
        
        body.dark-mode .btn, body.dark-mode .format-btn, body.dark-mode .font-select { background: #2a2a2a; color: #e0e0e0; border-color: #444; }
        body.dark-mode #main-section { background: #161616; }
        body.dark-mode .tab-item { background: var(--block-bg); color: #e0e0e0; border-color: #444; }
        body.dark-mode .action-popup, body.dark-mode .tab-menu { background: #252525; border-color: #444; color: #e0e0e0; }

        body { margin: 0; font-family: var(--font-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--text); transition: background 0.3s; }
        
        #toolbar { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; background: var(--toolbar-bg); gap: 10px; z-index: 100; flex-shrink: 0; }
        
        .logo-box { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--logo-text); border-right: 1px solid var(--border); padding-right: 15px; cursor: pointer; transition: color 0.3s; }
        .logo-circle { width: 28px; height: 28px; background: var(--logo-text); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--toolbar-bg); font-family: serif; transition: background 0.3s, color 0.3s; }

        .btn { padding: 8px 14px; border: 1px solid var(--border); background: white; cursor: pointer; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: var(--font-main); transition: 0.2s; color: var(--accent); }
        .btn:hover { background: #f0f4f8; }

        #format-bar { display: none; align-items: center; gap: 5px; margin-right: 5px; }
        .format-btn { width: 32px; height: 32px; border: 1px solid var(--border); background: white; border-radius: 4px; cursor: pointer; font-family: serif; font-weight: bold; font-size: 14px; color: var(--accent); display: flex; align-items: center; justify-content: center; }
        .font-select { height: 32px; border: 1px solid var(--border); border-radius: 4px; padding: 0 5px; font-size: 12px; outline: none; background: white; color: var(--accent); cursor: pointer; }

        #stopwatch-container { display: flex; align-items: center; gap: 12px; margin-left: auto; margin-right: 15px; background: #f1f3f5; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }
        body.dark-mode #stopwatch-container { background: #252525; }
        #timer-display { font-family: monospace; font-size: 16px; font-weight: 700; color: var(--accent); min-width: 90px; text-align: center; }
        body.dark-mode #timer-display { color: #fff; }
        .stopwatch-btn { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 14px; font-weight: 800; padding: 2px 6px; }
        body.dark-mode .stopwatch-btn { color: #fff; }

        #home-screen { position: fixed; top: 50px; left: 0; width: 100%; height: calc(100% - 50px); background: linear-gradient(rgba(0, 35, 71, 0.5), rgba(0, 35, 71, 0.7)), url('https://image2url.com/r2/default/images/1772485982259-44630081-12dd-4d2c-8975-d889f689d625.png'); background-size: cover; background-position: center; z-index: 90; display: flex; flex-direction: column; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .case-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px) saturate(160%); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 18px; padding: 25px; cursor: pointer; position: relative; transition: 0.3s ease; color: white; min-height: 100px; display: flex; align-items: center; }
        
        #workspace { display: none; flex: 1; overflow: hidden; background: #fff; }
        #main-section { width: 40%; min-width: 250px; padding: 20px; background: #eaeff2; overflow-y: auto; box-sizing: border-box; }
        #resizer { width: 10px; cursor: col-resize; z-index: 1000; background: #dee2e6; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        #tab-view { flex: 1; padding: 45px; overflow-y: auto; background: white; }
        #sidebar { width: 320px; border-left: 1px solid var(--border); background: #fdfdfd; display: flex; flex-direction: column; }
        .doc { background: white; min-height: 100%; padding: 45px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); outline: none; }
        
        .tab-item { position: relative; padding: 14px; margin: 5px 15px; background: white; border: 1px solid var(--border); border-radius: 8px; cursor: grab; font-size: 14px; display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        .tab-item.active { border-color: var(--accent); border-width: 2px; font-weight: 700; }

        .action-popup, .tab-menu { position: absolute; background: white; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 3000; display: none; flex-direction: column; border: 1px solid #eee; width: 160px; color: var(--text); }
        
        #speech-win { position: fixed; width: 450px; background: white; border-radius: 12px; box-shadow: 0 25px 60px rgba(0,0,0,0.4); display: none; z-index: 5000; top: 50%; left: 50%; transform: translate(-50%, -50%); overflow: hidden; border: 1px solid var(--border); color: #1c1e21; }
        body.dark-mode #speech-win { background: #252525; color: #fff; }
        #speech-head { padding: 15px; background: var(--accent); color:white; display:flex; justify-content:space-between; font-weight:700; }
        .speech-table { width:100%; font-size:14px; border-collapse: collapse; }
        .speech-table th { background: #f8f9fa; text-align: left; padding: 12px 15px; border-bottom: 2px solid #dee2e6; color: var(--accent); }
        body.dark-mode .speech-table th { background: #1a1a1a; color: #fff; border-bottom: 2px solid #444; }
        .speech-table td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        body.dark-mode .speech-table td { border-bottom: 1px solid #333; }

        #sticky-note { position: absolute; width: 300px; height: 300px; background: #fff9c4; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-radius: 4px; display: none; flex-direction: column; z-index: 2500; top: 100px; left: 100px; border: 1px solid #f0e68c; overflow: hidden; resize: both; }
        #sticky-header { padding: 12px; background: #f0e68c; cursor: move; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: #857b26; user-select: none; }
        #sticky-content { flex: 1; border: none; background: transparent; padding: 15px; resize: none; outline: none; font-family: monospace; font-size: 14px; }

        hr { border: 0; border-top: 2px solid var(--border); margin: 20px 0; }
    </style>
</head>
<body ondragover="event.preventDefault()">

<div id="toolbar">
    <div class="logo-box" onclick="location.reload()"><div class="logo-circle">E</div><span>EduardOS</span></div>
    <button class="btn" onclick="showHome()">Home</button>
    <button class="btn" onclick="toggleSpeech()">Speaker Order</button>
    
    <div id="stopwatch-container">
        <button class="stopwatch-btn" onclick="toggleTimer()" id="st-btn">START</button>
        <div id="timer-display">00:00:00</div>
        <button class="stopwatch-btn" onclick="resetTimer()">RESET</button>
    </div>

    <div id="format-bar">
        <select class="font-select" onchange="execCommandWithArg('fontName', this.value)">
            <option value="SF Pro Display">SF Pro</option>
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
        </select>
        <button class="format-btn" onclick="execFormat('bold')">B</button>
        <button class="format-btn" onclick="execFormat('italic')">I</button>
        <button class="format-btn" onclick="execFormat('underline')">U</button>
        <button class="format-btn" onclick="execFormat('insertHorizontalRule')">—</button>
        <button class="format-btn" onclick="changeFontSize(1)">A+</button>
        <button class="format-btn" onclick="changeFontSize(-1)">A-</button>
    </div>

    <button class="btn" id="notes-btn" onclick="toggleNotes()" style="display:none; background: #fff9c4; color: #857b26; border: none;">Quick Note</button>
    <button class="btn" id="add-tab-btn" onclick="addTab()" style="display:none;">+ New Block</button>
    <button class="btn" onclick="toggleSettings(event)">Settings</button>
    
    <div id="settings-popup" class="action-popup">
        <button class="menu-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
        <button class="menu-btn" style="color:red;" onclick="clearAllCases()">Clear All Data</button>
    </div>
</div>

<div id="home-screen">
    <div style="display:flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%; color: white;">
        <h1>Strategic Case Files</h1>
        <button class="btn" style="background: var(--accent); color:white; border:none;" onclick="createNewCase()">+ Create New Case</button>
    </div>
    <div class="case-grid" id="case-grid"></div>
</div>

<div id="workspace" ondrop="handleExternalDrop(event)">
    <div id="main-section"><div id="main-editor" class="doc" contenteditable="true" oninput="syncMainCase()" onkeydown="handleKeyDown(event)"></div></div>
    <div id="resizer"></div>
    <div id="right-zone">
        <div id="tab-view">
            <div id="active-title" style="font-size:34px; margin-bottom:20px; font-weight:700; outline:none;" contenteditable="true" oninput="syncTabTitle()"></div>
            <div id="active-body" style="outline:none; line-height:1.8; font-size:18px;" contenteditable="true" oninput="syncTabBody()" onkeydown="handleKeyDown(event)"></div>
        </div>
        <div id="sidebar">
            <div class="search-container" style="padding:15px;"><input type="text" id="sidebar-search" placeholder="Search..." oninput="renderTabs()" style="width:100%; padding:8px; border-radius:4px; border:1px solid var(--border);"></div>
            <div id="tab-list"></div>
        </div>
    </div>
</div>

<div id="speech-win">
    <div id="speech-head"><span>SPEAKER ORDER (LD)</span><span onclick="toggleSpeech()" style="cursor:pointer">×</span></div>
    <table class="speech-table">
        <tr><th>Speech</th><th>Time</th><th>Prep</th></tr>
        <tr><td>Affirmative Constructive</td><td>6 min</td><td>—</td></tr>
        <tr><td>Cross-Ex of Aff</td><td>3 min</td><td>—</td></tr>
        <tr><td>Negative Constructive</td><td>7 min</td><td>4 min</td></tr>
        <tr><td>Cross-Ex of Neg</td><td>3 min</td><td>—</td></tr>
        <tr><td>1st Aff Rebuttal</td><td>4 min</td><td>4 min</td></tr>
        <tr><td>Neg Rebuttal</td><td>6 min</td><td>—</td></tr>
        <tr><td>2nd Aff Rebuttal</td><td>3 min</td><td>—</td></tr>
    </table>
</div>

<div id="sticky-note">
    <div id="sticky-header"><span>FLOATING NOTE</span><span onclick="toggleNotes()" style="cursor:pointer">CLOSE</span></div>
    <textarea id="sticky-content"></textarea>
</div>

<script>
    let cases = JSON.parse(localStorage.getItem('eduardos_data_v4')) || [];
    let currentCaseIdx = null, currentTabIdx = null;

    function execFormat(cmd) { document.execCommand(cmd, false, null); }
    function execCommandWithArg(cmd, arg) { document.execCommand(cmd, false, arg); }

    function handleKeyDown(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            const selection = window.getSelection();
            const container = selection.anchorNode.parentElement.closest('li');
            if (e.shiftKey) {
                if (container) document.execCommand('outdent');
            } else {
                if (container) { document.execCommand('indent'); } 
                else { document.execCommand('insertHTML', false, '&#009'); }
            }
        }
        if (e.key === ' ') {
            const sel = window.getSelection();
            const node = sel.anchorNode;
            const text = node.textContent.slice(0, sel.anchorOffset);
            if (text === '-' || text === '*') {
                e.preventDefault();
                node.textContent = node.textContent.slice(sel.anchorOffset);
                document.execCommand('insertUnorderedList');
            }
        }
    }

    function changeFontSize(dir) {
        const sel = window.getSelection(); if (!sel.rangeCount) return;
        const parent = sel.anchorNode.parentElement;
        const cur = window.getComputedStyle(parent).fontSize;
        parent.style.fontSize = (parseFloat(cur) + (dir * 2)) + "px";
    }

    function renderHome() {
        document.getElementById('home-screen').style.display = "flex";
        document.getElementById('workspace').style.display = "none";
        document.getElementById('format-bar').style.display = "none";
        document.getElementById('notes-btn').style.display = "none";
        document.getElementById('add-tab-btn').style.display = "none";
        const grid = document.getElementById('case-grid'); grid.innerHTML = '';
        cases.forEach((c, i) => {
            const card = document.createElement('div'); card.className = 'case-card';
            card.onclick = () => openCase(i);
            card.innerHTML = `<strong>${c.name}</strong><div style="position:absolute; right:15px;" onclick="deleteCase(event, ${i})">🗑️</div>`;
            grid.appendChild(card);
        });
    }

    function openCase(i) {
        currentCaseIdx = i;
        document.getElementById('home-screen').style.display = "none";
        document.getElementById('workspace').style.display = "flex";
        document.getElementById('format-bar').style.display = "flex";
        document.getElementById('notes-btn').style.display = "block";
        document.getElementById('add-tab-btn').style.display = "block";
        document.getElementById('main-editor').innerHTML = cases[i].mainContent || "";
        renderTabs();
    }

    function renderTabs() {
        const list = document.getElementById('tab-list'); list.innerHTML = '';
        if (currentCaseIdx === null) return;
        cases[currentCaseIdx].tabs.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = `tab-item ${i === currentTabIdx ? 'active' : ''}`;
            d.draggable = true;
            d.onclick = () => selectTab(i);
            d.ondragstart = (e) => { e.dataTransfer.setData('blockIndex', i); e.dataTransfer.setData('source', 'tab-list'); };
            d.innerHTML = `<span>${t.title}</span><span onclick="deleteTab(event, ${i})">×</span>`;
            list.appendChild(d);
        });
    }

    function handleExternalDrop(e) {
        if (e.dataTransfer.getData('source') === 'tab-list') {
            const idx = parseInt(e.dataTransfer.getData('blockIndex'));
            const block = cases[currentCaseIdx].tabs[idx];
            document.getElementById('sticky-content').value = block.body.replace(/<[^>]*>/g, '');
            cases[currentCaseIdx].tabs.splice(idx, 1);
            noteEl.style.display = 'flex';
            xOffset = e.clientX - 150; yOffset = e.clientY - 150;
            noteEl.style.transform = `translate3d(${xOffset}px, ${yOffset}px, 0)`;
            save(); renderTabs();
        }
    }

    function selectTab(i) { currentTabIdx = i; document.getElementById('active-title').innerText = cases[currentCaseIdx].tabs[i].title; document.getElementById('active-body').innerHTML = cases[currentCaseIdx].tabs[i].body; renderTabs(); }
    function addTab() { cases[currentCaseIdx].tabs.push({ title: "New Block", body: "..." }); save(); renderTabs(); }
    function createNewCase() { const n = prompt("Name:"); if(n) { cases.push({ name: n, mainContent: "", tabs: [] }); save(); renderHome(); } }
    function deleteCase(e, i) { e.stopPropagation(); cases.splice(i,1); save(); renderHome(); }
    function deleteTab(e, i) { e.stopPropagation(); cases[currentCaseIdx].tabs.splice(i, 1); save(); renderTabs(); }
    function syncMainCase() { cases[currentCaseIdx].mainContent = document.getElementById('main-editor').innerHTML; save(); }
    function syncTabTitle() { cases[currentCaseIdx].tabs[currentTabIdx].title = document.getElementById('active-title').innerText; save(); renderTabs(); }
    function syncTabBody() { cases[currentCaseIdx].tabs[currentTabIdx].body = document.getElementById('active-body').innerHTML; save(); }
    function save() { localStorage.setItem('eduardos_data_v4', JSON.stringify(cases)); }
    function showHome() { renderHome(); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function toggleSettings(e) { e.stopPropagation(); const p = document.getElementById('settings-popup'); p.style.display = p.style.display === 'flex' ? 'none' : 'flex'; }
    function clearAllCases() { localStorage.clear(); location.reload(); }
    function toggleSpeech() { const s = document.getElementById('speech-win'); s.style.display = (s.style.display === 'block') ? 'none' : 'block'; }

    let startTime, elapsedTime = 0, timerInterval, timerRunning = false;
    function toggleTimer() {
        if (!timerRunning) {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                let d = elapsedTime, m = Math.floor(d/60000), s = Math.floor((d%60000)/1000);
                document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
            document.getElementById('st-btn').innerText = 'PAUSE'; timerRunning = true;
        } else { clearInterval(timerInterval); document.getElementById('st-btn').innerText = 'START'; timerRunning = false; }
    }
    function resetTimer() { elapsedTime = 0; document.getElementById('timer-display').innerText = '00:00'; }

    const noteEl = document.getElementById("sticky-note");
    let activeDrag = false, xOffset = 0, yOffset = 0, initialX, initialY;
    function toggleNotes() { noteEl.style.display = noteEl.style.display === 'flex' ? 'none' : 'flex'; }
    document.addEventListener("mousedown", (e) => { if (e.target.closest('#sticky-header')) { activeDrag = true; initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; }});
    document.addEventListener("mousemove", (e) => { if (activeDrag) { xOffset = e.clientX - initialX; yOffset = e.clientY - initialY; noteEl.style.transform = `translate3d(${xOffset}px, ${yOffset}px, 0)`; }});
    document.addEventListener("mouseup", () => { activeDrag = false; });

    renderHome();
</script>
</body>
</html>
