<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduardOS</title>
    <style>
        :root { 
            --accent: #002347; 
            --border: #ced4da; 
            --font-main: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body { margin: 0; font-family: var(--font-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #toolbar { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; background: white; gap: 10px; z-index: 100; flex-shrink: 0; }
        .logo-box { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--accent); border-right: 1px solid var(--border); padding-right: 15px; }
        .logo-circle { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-family: serif; }

        /* THE LIQUID GLASS EFFECT */
        .glass-btn, .case-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 100%);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            
            /* The "Liquid" Rim Highlight */
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.7);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
            
            border-radius: 20px;
            color: white;
            cursor: pointer;
            
            /* Depth Shadows */
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.2), 
                inset 0 1px 1px rgba(255, 255, 255, 0.6),
                inset 0 -1px 20px rgba(255, 255, 255, 0.1);
            
            transition: all 0.4s cubic-bezier(0.15, 0.83, 0.66, 1);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .glass-btn { padding: 12px 30px; font-weight: 700; font-size: 15px; border-radius: 14px; }

        .case-card { 
            padding: 30px; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }

        .case-card:hover, .glass-btn:hover {
            transform: translateY(-5px) scale(1.02);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.15) 100%);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.8);
        }

        /* Home Screen Background */
        #home-screen { 
            position: fixed; top: 50px; left: 0; width: 100%; height: calc(100% - 50px); 
            background: radial-gradient(circle at top left, #003a70, #001529);
            z-index: 90; display: flex; flex-direction: column; padding: 40px; box-sizing: border-box; overflow-y: auto; 
        }

        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
        
        /* Workspace UI */
        #workspace { display: flex; flex: 1; overflow: hidden; position: relative; background: #fff; }
        #main-section { width: 38%; padding: 20px; background: #eaeff2; overflow-y: auto; }
        #resizer { width: 16px; margin: 0 -8px; cursor: col-resize; z-index: 1000; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #resizer::after { content: ""; width: 4px; height: 40px; background: #cbd5e0; border-radius: 10px; }
        #right-zone { flex: 1; display: flex; overflow: hidden; }
        #tab-view { flex: 1; padding: 45px; overflow-y: auto; }
        #sidebar { width: 280px; border-left: 1px solid #ced4da; background: #fdfdfd; }
        .doc { background: white; min-height: 100%; padding: 45px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); outline: none; }

        .action-popup { position: absolute; top: 45px; right: 15px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; flex-direction: column; width: 150px; z-index: 200; overflow: hidden; }
        .action-popup button { border: none; padding: 12px 16px; text-align: left; background: none; cursor: pointer; font-size: 14px; font-family: var(--font-main); color: #1c1e21; font-weight: 500;}
    </style>
</head>
<body>

<div id="toolbar">
    <div class="logo-box"><div class="logo-circle">E</div><span style="margin-left:8px">EduardOS</span></div>
    <button style="font-family: var(--font-main); font-weight: 600;" onclick="showHome()">Home</button>
    <button style="font-family: var(--font-main); font-weight: 600;" onclick="toggleSpeech()">Speech Times</button>
    <div style="flex:1"></div>
</div>

<div id="home-screen">
    <div style="display:flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%; color: white;">
        <h1 style="font-weight: 800; letter-spacing: -0.5px; font-size: 36px;">Strategic Case Files</h1>
        <button class="glass-btn" onclick="createNewCase()">+ New Case</button>
    </div>
    <div class="case-grid" id="case-grid" style="max-width: 1200px; margin: 0 auto; width: 100%;"></div>
</div>

<div id="workspace" style="display:none;">
    <div id="main-section"><div id="main-editor" class="doc" contenteditable="true" oninput="syncMainCase()"></div></div>
    <div id="resizer"></div>
    <div id="right-zone">
        <div id="tab-view">
            <div id="active-title" style="font-size:34px; margin-bottom:25px; outline:none; font-weight: 300;" contenteditable="true" oninput="syncTabTitle()"></div>
            <div id="active-body" style="outline:none; line-height:1.8; font-size:17px;" contenteditable="true" oninput="syncTabBody()"></div>
        </div>
        <div id="sidebar">
            <div style="padding:25px 15px 10px; font-size:11px; color:#a0aec0; font-weight:bold;">ARGUMENT REPOSITORY</div>
            <div id="tab-list"></div>
        </div>
    </div>
</div>

<script>
    let cases = JSON.parse(localStorage.getItem('eduardos_data_v5')) || [];
    let currentCaseIdx = null;

    function renderHome() {
        document.getElementById('home-screen').style.display = "flex";
        document.getElementById('workspace').style.display = "none";
        const grid = document.getElementById('case-grid'); grid.innerHTML = '';
        cases.forEach((c, i) => {
            const card = document.createElement('div');
            card.className = 'case-card';
            card.onclick = () => openCase(i);
            card.innerHTML = `
                <div style="font-weight:800; font-size: 22px;">${c.name}</div>
                <div style="font-size:11px; margin-top:6px; opacity:0.8; text-transform:uppercase; letter-spacing:1.5px; font-weight:700;">Dossier v1.0</div>
                <div style="position:absolute; top:20px; right:20px; font-size:20px; opacity:0.6;" onclick="toggleMenu(event, ${i})">⋮</div>
                <div id="menu-${i}" class="action-popup">
                    <button onclick="renameCase(event, ${i})">Rename</button>
                    <button style="color:#e53e3e;" onclick="deleteCase(event, ${i})">Delete</button>
                </div>`;
            grid.appendChild(card);
        });
    }

    function toggleMenu(e, i) { e.stopPropagation(); document.querySelectorAll('.action-popup').forEach(m => m.style.display = 'none'); document.getElementById(`menu-${i}`).style.display = 'flex'; }
    window.onclick = () => document.querySelectorAll('.action-popup').forEach(m => m.style.display = 'none');
    
    function openCase(i) {
        currentCaseIdx = i;
        document.getElementById('home-screen').style.display = "none";
        document.getElementById('workspace').style.display = "flex";
        document.getElementById('main-editor').innerHTML = cases[i].mainContent;
    }

    function createNewCase() { const n = prompt("Case Name:"); if (n) { cases.push({ name: n, mainContent: "<h1>" + n + "</h1>", tabs: [] }); save(); renderHome(); } }
    function save() { localStorage.setItem('eduardos_data_v5', JSON.stringify(cases)); }
    function showHome() { renderHome(); }
    function deleteCase(e, i) { e.stopPropagation(); if(confirm("Delete?")) cases.splice(i,1); save(); renderHome(); }
    function syncMainCase() { cases[currentCaseIdx].mainContent = document.getElementById('main-editor').innerHTML; save(); }

    renderHome();
</script>
</body>
</html>
